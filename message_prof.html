<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacter le professeur</title>
</head>
<body bgcolor="lightgray">
    <h1 style="text-align:center;">Envoyer un message au professeur</h1>
    <center>
    <form action="">
        <label><font size="5">Nom:</font></label>
        <input type="text" name="Nom" ><br><br>
        <label><font size="5">Email:</font></label>
        <input type="Email" name="Email" ><br><br>
        <label><font size="5">Message:</font></label><br>
        <textarea name="Message" rows="5" cols="30"></textarea><br>
        <input type="submit" value="Envoyer" style="background-color: green; color: white;">
    </form>
    </center>
</body>
</html>
